name: Release Please

# Runs on every push to main. release-please scans the Conventional Commits since
# the last release and maintains a single "release PR": it bumps the version across
# package.json + the extra-files (tauri.conf.json, Cargo.toml, metainfo, spec) and
# regenerates CHANGELOG.md. Merging that PR tags the release (vX.Y.Z) and creates the
# GitHub Release. Until merged, the PR keeps updating itself with new commits.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Avoid two release runs racing on rapid pushes.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # A PAT (not the default GITHUB_TOKEN) so that opening/updating the release PR
          # triggers other workflows — notably ci.yml — on that PR. Events raised by the
          # built-in GITHUB_TOKEN are intentionally suppressed by GitHub and would never
          # start CI. Falls back to GITHUB_TOKEN if the secret isn't set (PR opens, but
          # CI won't run on it).
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
