name: Update Homebrew Tap

on:
  workflow_call:
    inputs:
      tag_name:
        description: "Release tag name (e.g. v0.5.0)"
        type: string
        required: true
  workflow_dispatch:
    inputs:
      version:
        description: "Version to sync (e.g. 0.3.14). Defaults to latest release."
        required: false

jobs:
  update-homebrew:
    runs-on: macos-latest
    steps:
      - name: Get version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            # Called from release-please workflow — tag_name is the full tag (e.g. melo-v0.4.12)
            TAG="${{ inputs.tag_name }}"
          elif [ -n "${{ inputs.version }}" ]; then
            # Manual dispatch with a version — look up the actual tag from releases
            TAG=$(gh release list --repo ${{ github.repository }} --json tagName -q "[.[] | select(.tagName | test(\"${{ inputs.version }}\"))][0].tagName")
            if [ -z "$TAG" ]; then
              TAG="melo-v${{ inputs.version }}"
            fi
          else
            # Manual dispatch without version — use latest release
            TAG=$(gh release view --repo ${{ github.repository }} --json tagName -q '.tagName')
          fi
          BARE_VERSION="${TAG##*v}"
          echo "version=${BARE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${BARE_VERSION} (tag: ${TAG})"

      - name: Wait for DMG and compute SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/Melo_${VERSION}_universal.dmg"

          echo "Downloading DMG from: ${DMG_URL}"
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sL -o Melo.dmg -w "%{http_code}" "$DMG_URL")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Download succeeded (attempt $i)"
              break
            fi
            echo "Attempt $i failed (HTTP $HTTP_CODE), retrying in 60s..."
            rm -f Melo.dmg
            if [ "$i" = "5" ]; then
              echo "::error::DMG not available after 5 attempts"
              exit 1
            fi
            sleep 60
          done

          SHA256=$(shasum -a 256 Melo.dmg | awk '{print $1}')
          echo "SHA256: ${SHA256}"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: M4lmostoso/homebrew-melo
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-melo

      - name: Update cask definition
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"

          cat > homebrew-melo/Casks/melo.rb << CASK_EOF
          cask "melo" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/${{ github.repository }}/releases/download/melo-v#{version}/Melo_#{version}_universal.dmg",
                verified: "github.com/${{ github.repository }}/"

            name "Melo"
            desc "Fast, beautiful desktop email client"
            homepage "https://github.com/${{ github.repository }}"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "Melo.app"

            caveats <<~EOS
              If the app is not notarized, macOS may block it on first launch.
              To allow it, right-click Melo.app and select "Open", or run:
                xattr -cr /Applications/Melo.app
            EOS

            zap trash: [
              "~/Library/Application Support/com.melomail.app",
              "~/Library/Caches/com.melomail.app",
              "~/Library/Preferences/com.melomail.app.plist",
              "~/Library/Saved Application State/com.melomail.app.savedState",
              "~/Library/WebKit/com.melomail.app",
            ]
          end
          CASK_EOF

      - name: Commit and push to tap
        working-directory: homebrew-melo
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/melo.rb
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update melo to ${VERSION}"
          git push
