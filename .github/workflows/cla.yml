name: CLA Assistant

# Enforces the Contributor License Agreement (CLA.md). On every pull request,
# contributors must sign by commenting the agreement sentence. Signatures are
# stored in this repo at signatures/version1/cla.json.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: signatures/version1/cla.json
          path-to-document: https://github.com/M4lmostoso/melo/blob/main/CLA.md
          # Signatures live on a dedicated UNPROTECTED branch. The bot commits the
          # signatures file here; if it pointed at main, main's required status checks
          # would reject the bot's direct commit and the CLA check would fail.
          branch: cla-signatures
          # Maintainers and bots that don't need to sign.
          allowlist: M4lmostoso,dependabot[bot],renovate[bot]
          custom-notsigned-prcomment: 'Thank you for your contribution! Before it can be merged, please read our [Contributor License Agreement](https://github.com/M4lmostoso/melo/blob/main/CLA.md) and sign it by posting the following comment on this PR:'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
